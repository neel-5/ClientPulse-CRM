services:
  api:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://clientpulse:clientpulse@db:5432/clientpulse
      SECRET_KEY: ${SECRET_KEY:-change-this-in-production}
      CORS_ORIGINS: http://localhost:5173
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000
    ports:
      - "5173:80"
    depends_on:
      - api
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: clientpulse
      POSTGRES_USER: clientpulse
      POSTGRES_PASSWORD: clientpulse
    volumes:
      - clientpulse_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clientpulse"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  clientpulse_data:
